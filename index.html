<!DOCTYPE html>
<html>
<head>
<title>School System</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f6f9;
}

/* Sidebar */
.sidebar{
  width:220px;
  height:100vh;
  background:#2c3e50;
  position:fixed;
  left:0;
  top:0;
  padding:20px;
}

.sidebar h2{
  color:white;
  text-align:center;
}

.sidebar a{
  display:block;
  color:white;
  text-decoration:none;
  padding:10px;
  margin:10px 0;
  border-radius:5px;
}

.sidebar a:hover{
  background:#34495e;
}

/* Main content */
.main{
  margin-left:240px;
  padding:20px;
  text-align:center;
}

/* Header */
.header{
  display:flex;
  align-items:center;
  justify-content:center;
  background:#fff;
  padding:10px;
  border-bottom:3px solid #3498db;
}

.logo{
  width:60px;
  height:60px;
  margin-right:10px;
  border-radius:50%;
}

.school-name{
  font-size:22px;
  font-weight:bold;
  color:#2c3e50;
}

/* Slider */
.slider{
  width:90%;
  max-width:600px;
  height:300px;
  margin:20px auto;
  overflow:hidden;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.slide{
  width:100%;
  height:300px;
  display:none;
  object-fit:cover;
}

/* Mobile */
@media(max-width:768px){
  .sidebar{
    width:100px;
  }
  .main{
    margin-left:110px;
  }
}
</style>

</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
  <h2>Menu</h2>

  <a href="https://docs.google.com/forms/d/1W4fBWpkIw42ikVTeFl6wIksAj3H6ZKhKiZBJ8C4b3o4/viewform">Admission</a>

  <a href="https://docs.google.com/forms/d/1KDGnNbjPwZ6wH9oT3waReguycSxdLu3DRT-Yy5dKwEU/viewform">Teachers</a>

  <a href="https://docs.google.com/forms/d/1QlL8YyMnUsqXSyA9RXoUKKrLTbMbSCUChuOeM5M6ZFk/viewform">Marks</a>
  <a href="https://drive.google.com/open?id=1cl7toRYdq4hKWBV_PA5CNtMsSidv9aFoBjC9mqhDll8&authuser=0&usp=forms_home&ths=true">FEE PAID</a>
</div>

<!-- Main Content -->
<div class="main">

<div class="header">
  <img src="images.jfif" class="logo">
  <div class="school-name">S.B PUBLIC SCHOOL CHHITAUNA</div>
</div>

<h2>Aman Yadav</h2>

<!-- Slider -->
<div class="slider">
  <img class="slide" src="images.jfif">
  <img class="slide" src="photo2.jpg">
  <img class="slide" src="photo3.jpg">
  <img class="slide" src="photo4.jpg">
</div>

</div>

<!-- Slider Script -->
<script>
let index = 0;
showSlides();

function showSlides(){
  let slides = document.getElementsByClassName("slide");

  for(let i=0;i<slides.length;i++){
    slides[i].style.display="none";
  }

  index++;
  if(index > slides.length){index = 1;}

  slides[index-1].style.display="block";

  setTimeout(showSlides,2000);
}
</script>

</body>
</html>
